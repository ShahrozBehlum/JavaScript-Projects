<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="child-container">
            <h1 class="title1">Number guessing game</h1>
            <p>Try and guess a random number between 1 and 100. <br/> You have 10 attempts to guess the rigth number</p>
            <h1 class="title2">Guess a Number</h1>
            <form>
                <input type="text">
                <button type="submit">Submit guess</button>
            </form>
            <p class="result"></p>
            <p id="prev-guess"></p>
            <p id="rem-guess"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
