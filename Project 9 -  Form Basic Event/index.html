<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulated Order System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="body-container">
            <h1>Simulated Order System</h1>
        <div class="form">
             <div class="name">
                <input type="text" id="customerName" placeholder="Enter Your Name">
             </div>
             <div class="product-selection">
                <input type="text" id="productSelect" placeholder="Enter Product">
             </div>
             <div class="btn">
               <button id="btn">Submit</button>
             </div>
        </div>
        <div class="status-box">
            <div class="result">
                <p>Result</p>
            </div>
            <div class="alert">
                <p></p>
            </div>
            <div class="msg">
                <p></p>
            </div>
        </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
