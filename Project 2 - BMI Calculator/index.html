<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="child-container">
            <h1>BMI Calculator</h1>
            <form>
                <div class="field1">
                    <label>Heigth in CM</label>
                    <input type="text">
                </div>
                <div class="field2">
                    <label>Weigth in KG</label>
                    <input type="text">
                </div>
                <button>CalCulate</button>
            </form>
            <p class="result"></p>
            <p class="lebel">BMI Weigth Guide</p>
            <p>Under Weigth = Less than 18.6</p>
            <p>Normal Range = 18.6 and 24.9</p>
            <p>Overweigth = Greater than 24.9</p>
        </div>
    </div>
    <script src="scirpt.js"></script>
</body>
</html>
